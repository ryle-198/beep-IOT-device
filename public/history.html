<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>BEEP Security Dashboard</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background-color: #0d0d0d;
  color: #e5e7eb;
}
.glass-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
}
.scrollbar-hide::-webkit-scrollbar {
  display: none;
}
</style>

</head>

<body class="flex h-screen">

<aside class="w-64 flex-shrink-0 bg-[#0c0c0c] flex flex-col border-r border-white/5">

<div class="p-8 pb-12">
<h1 class="text-xl font-bold tracking-widest">BEEP</h1>
</div>

<nav class="flex-1 space-y-2 px-4">

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5 transition-colors"
href="index.html">
<span>Overview</span>
</a>

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5 transition-colors"
href="set-alarm.html">
<span>Set Alarm Time</span>
</a>

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5 transition-colors"
href="history.html">
<span>History</span>
</a>

</nav>

</aside>

<!-- Main code section -->
<main class="flex-1 overflow-y-auto bg-[#0d0d0d] scrollbar-hide">

<header class="sticky top-0 z-10 flex items-center justify-between px-10 py-6 bg-[#0d0d0d]/80 backdrop-blur-sm">
<h2 class="text-xl font-bold">Security Dashboard</h2>
</header>

<div class="px-10 pb-10 space-y-8">

<div class="grid grid-cols-3 gap-6 mb-8">
<div class="col-span-2 glass-card rounded-3xl p-6 border border-white/5 flex justify-between items-center">
  <div>
    <h2 class="text-gray-400 font-medium mb-1">Log Analytics</h2>
    <p class="text-sm text-gray-500">Showing live recorded events.</p>
  </div>
</div>
</div>

<div class="glass-card rounded-3xl border border-white/5 overflow-hidden">
<table class="w-full text-left border-collapse">

<thead>
<tr class="text-[11px] text-gray-500 uppercase tracking-widest border-b border-white/5">
<th class="px-8 py-5">Event Description</th>
<th class="px-6 py-5">Source</th>
<th class="px-6 py-5">Status</th>
<th class="px-6 py-5">Date & Time</th>
<th class="px-6 py-5 text-center">Actions</th>
</tr>
</thead>

<tbody id="history-body" class="divide-y divide-white/5"></tbody>

</table>
</div>

</div>

<footer class="fixed bottom-0 left-64 right-0 border-t border-gray-800/30 px-10 py-3 text-xs text-gray-500">
System Online
</footer>

</main>

<script src="js/history.js"></script>
</body>
</html>

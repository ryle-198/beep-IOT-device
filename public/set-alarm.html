<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BEEP Security Dashboard</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Inter', sans-serif;
  background-color: #0d0d0d;
  color: #e5e7eb;
}

.glass-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}

.sidebar-active {
  background: rgba(45,212,191,0.1);
  border-right: 2px solid #2dd4bf;
  color: #2dd4bf;
}

.scrollbar-hide::-webkit-scrollbar {
  display: none;
}
</style>
</head>

<body class="flex h-screen overflow-hidden">

<aside class="w-64 flex-shrink-0 bg-[#0c0c0c] flex flex-col border-r border-white/5">

<div class="p-8 pb-12">
<h1 class="text-xl font-bold tracking-widest">BEEP</h1>
</div>

<nav class="flex-1 space-y-2 px-4">

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5"
href="index.html">
<span class="text-sm font-medium">Overview</span>
</a>

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg sidebar-active"
href="set-alarm.html">
<span class="text-sm font-medium">Set Alarm Time</span>
</a>

<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5"
href="history.html">
<span class="text-sm font-medium">History</span>
</a>

</nav>

</aside>

<main class="flex-1 overflow-y-auto bg-[#0d0d0d] scrollbar-hide">

<header class="sticky top-0 z-10 flex items-center justify-between px-10 py-6 bg-[#0d0d0d]/80 backdrop-blur-sm">
<h2 class="text-xl font-bold">Security Dashboard</h2>
</header>

<div class="px-10 pb-10 space-y-8">

<div class="glass-card rounded-3xl p-8">

<div class="flex justify-between items-start mb-8">

<div>
<h2 class="text-xl font-bold">Configure Activation</h2>
<p class="text-sm text-gray-500">Set ARM and DISARM schedule</p>
</div>

<span class="text-[10px] text-teal-400 uppercase tracking-widest font-bold">
AUTO SCHEDULING
</span>

</div>

<div class="grid grid-cols-2 gap-10">

<!-- ARM -->
<div>

<h3 class="text-lg font-bold mb-4 text-teal-400">
ARM TIME
</h3>

<input
id="arm-time"
type="time"
class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white"
/>

</div>

<!-- DISARM -->
<div>

<h3 class="text-lg font-bold mb-4 text-red-400">
DISARM TIME
</h3>

<input
id="disarm-time"
type="time"
class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white"
/>

</div>

</div>

<div class="mt-8">

<button
id="save-btn"
class="w-full bg-teal-400 text-black font-bold py-4 rounded-xl hover:bg-teal-300 transition"
>
SAVE SCHEDULE
</button>

</div>

<div class="mt-8 glass-card rounded-2xl p-6">

<p class="text-sm text-gray-400 mb-2">
Current Schedule
</p>

<h2 id="schedule-display" class="text-3xl font-bold">
--:-- → --:--
</h2>

</div>

</div>

</div>

</main>

<script>

const SERVER = "https://beep-iot-device-production.up.railway.app";

const armInput = document.getElementById("arm-time");
const disarmInput = document.getElementById("disarm-time");

const saveBtn = document.getElementById("save-btn");
const scheduleDisplay = document.getElementById("schedule-display");

async function loadSchedule() {

  try {

    const res = await fetch(`${SERVER}/status`);

    const data = await res.json();

    if (data.autoArmTime) {
      armInput.value = data.autoArmTime;
    }

    if (data.autoDisarmTime) {
      disarmInput.value = data.autoDisarmTime;
    }

    updateDisplay();

  } catch (err) {

    console.error(err);
  }
}

function updateDisplay() {

  const arm = armInput.value || "--:--";
  const disarm = disarmInput.value || "--:--";

  scheduleDisplay.textContent =
    `${arm} → ${disarm}`;
}

armInput.addEventListener("input", updateDisplay);
disarmInput.addEventListener("input", updateDisplay);

saveBtn.addEventListener("click", saveSchedule);

async function saveSchedule() {

  const armTime = armInput.value;
  const disarmTime = disarmInput.value;

  if (!armTime || !disarmTime) {

    alert("Please select both ARM and DISARM times");

    return;
  }

  try {

    const res = await fetch(`${SERVER}/set-times`, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        armTime,
        disarmTime
      })
    });

    const data = await res.json();

    if (data.success) {

      updateDisplay();

      alert("Schedule saved successfully");

    } else {

      alert("Failed to save schedule");
    }

  } catch (err) {

    console.error(err);

    alert("Server connection failed");
  }
}

loadSchedule();

</script>

</body>
</html>
